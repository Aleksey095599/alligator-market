<div class="center-box">
  <!-- карточка со списком паспортов процессов фиксации -->
  <mat-card>
    <mat-card-header>
      <mat-card-title>Capture Processes</mat-card-title>
    </mat-card-header>
    <mat-card-content>
      <table mat-table [dataSource]="dataSource" class="mat-elevation-z2">

        <ng-container matColumnDef="captureProcessCode">
          <th mat-header-cell *matHeaderCellDef>Code</th>
          <td mat-cell *matCellDef="let passport">{{ passport.captureProcessCode }}</td>
        </ng-container>

        <ng-container matColumnDef="displayName">
          <th mat-header-cell *matHeaderCellDef>Process</th>
          <td mat-cell *matCellDef="let passport">{{ passport.displayName }}</td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="displayed"></tr>
        <tr mat-row *matRowDef="let row; columns: displayed;"></tr>
        <tr class="mat-row" *matNoDataRow>
          <td class="mat-cell" [attr.colspan]="displayed.length">No capture process passports found.</td>
        </tr>
      </table>
    </mat-card-content>
  </mat-card>
</div>
