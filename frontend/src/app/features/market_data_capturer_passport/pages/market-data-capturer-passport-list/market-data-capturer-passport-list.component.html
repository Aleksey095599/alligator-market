<div class="center-box">
  <!-- карточка со списком паспортов процессов захвата -->
  <mat-card>
    <mat-card-header>
      <mat-card-title>Market Data Capturers</mat-card-title>
    </mat-card-header>
    <mat-card-content>
      <table mat-table [dataSource]="dataSource" class="mat-elevation-z2">

        <ng-container matColumnDef="capturerCode">
          <th mat-header-cell *matHeaderCellDef>Code</th>
          <td mat-cell *matCellDef="let passport">{{ passport.capturerCode }}</td>
        </ng-container>

        <ng-container matColumnDef="displayName">
          <th mat-header-cell *matHeaderCellDef>Capturer</th>
          <td mat-cell *matCellDef="let passport">{{ passport.displayName }}</td>
        </ng-container>

        <ng-container matColumnDef="lifecycleStatus">
          <th mat-header-cell *matHeaderCellDef>Status</th>
          <td mat-cell *matCellDef="let passport">
            <span
              class="status-badge"
              [class.status-badge--retired]="passport.lifecycleStatus === 'RETIRED'"
            >
              {{ passport.lifecycleStatus }}
            </span>
          </td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="displayed"></tr>
        <tr
          mat-row
          *matRowDef="let row; columns: displayed;"
          [class.retired-row]="row.lifecycleStatus === 'RETIRED'"
        ></tr>
        <tr class="mat-row" *matNoDataRow>
          <td class="mat-cell" [attr.colspan]="displayed.length">No capturer passports found.</td>
        </tr>
      </table>
    </mat-card-content>
  </mat-card>
</div>
