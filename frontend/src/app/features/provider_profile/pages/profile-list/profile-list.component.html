<div class="center-box">
  <!-- карточка со списком профилей провайдеров -->
  <mat-card>
    <mat-card-header>
      <mat-card-title>Provider Profiles</mat-card-title>
    </mat-card-header>
    <mat-card-content>
      <mat-slide-toggle [checked]="showAll" (change)="onToggle($event)" color="primary">Show all Status</mat-slide-toggle>
      <table mat-table [dataSource]="dataSource" class="mat-elevation-z2">

        <ng-container matColumnDef="statusIndicator">
          <th mat-header-cell *matHeaderCellDef class="status-indicator-cell"></th>
          <td mat-cell *matCellDef="let p" class="status-indicator-cell">
            <span class="status-indicator" [ngClass]="getStatusClass(p.status)"></span>
          </td>
        </ng-container>

        <ng-container matColumnDef="status">
          <th mat-header-cell *matHeaderCellDef>Status</th>
          <td mat-cell *matCellDef="let p">{{ p.status }}</td>
        </ng-container>

        <ng-container matColumnDef="providerCode">
          <th mat-header-cell *matHeaderCellDef>Code</th>
          <td mat-cell *matCellDef="let p">{{ p.providerCode }}</td>
        </ng-container>

        <ng-container matColumnDef="displayName">
          <th mat-header-cell *matHeaderCellDef>Name</th>
          <td mat-cell *matCellDef="let p">{{ p.displayName }}</td>
        </ng-container>

        <ng-container matColumnDef="instrumentTypes">
          <th mat-header-cell *matHeaderCellDef>Instruments</th>
          <td mat-cell *matCellDef="let p">{{ p.instrumentTypes.join(', ') }}</td>
        </ng-container>

        <ng-container matColumnDef="deliveryMode">
          <th mat-header-cell *matHeaderCellDef>Delivery</th>
          <td mat-cell *matCellDef="let p">{{ p.deliveryMode }}</td>
        </ng-container>

        <ng-container matColumnDef="accessMethod">
          <th mat-header-cell *matHeaderCellDef>Access</th>
          <td mat-cell *matCellDef="let p">{{ p.accessMethod }}</td>
        </ng-container>

        <ng-container matColumnDef="bulkSubscription">
          <th mat-header-cell *matHeaderCellDef>Bulk Subscription</th>
          <td mat-cell *matCellDef="let p">{{ p.bulkSubscription }}</td>
        </ng-container>

        <ng-container matColumnDef="minPollMs">
          <th mat-header-cell *matHeaderCellDef>Min Poll Interval, ms</th>
          <td mat-cell *matCellDef="let p">{{ p.minPollMs }}</td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="displayed"></tr>
        <tr mat-row *matRowDef="let row; columns: displayed;"></tr>
      </table>
    </mat-card-content>
  </mat-card>
</div>
