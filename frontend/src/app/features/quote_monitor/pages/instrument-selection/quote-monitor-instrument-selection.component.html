<div class="center-box">

  <h1 class="mat-headline-4">Quote Monitor Instruments</h1>

  <mat-card class="toolbar-card">
    <mat-card-content>
      <div class="selection-toolbar">
        <mat-form-field appearance="outline" class="filter-field">
          <mat-label>Search instruments</mat-label>
          <input
            matInput
            #filterInput
            [value]="filterValue"
            (input)="onFilter(filterInput.value)"
          />
          <button
            *ngIf="filterValue"
            mat-icon-button
            matSuffix
            type="button"
            aria-label="Clear search"
            matTooltip="Clear search"
            (click)="clearFilter()"
          >
            <mat-icon>close</mat-icon>
          </button>
        </mat-form-field>

        <div class="selection-summary">
          <span class="summary-value">{{ selectedCount }}</span>
          <span class="summary-label">Selected</span>
          <span class="summary-divider"></span>
          <span class="summary-value">{{ candidateCount }}</span>
          <span class="summary-label">Candidates</span>
        </div>

        <div class="toolbar-actions">
          <button
            mat-stroked-button
            type="button"
            (click)="reload()"
            [disabled]="locked"
          >
            <mat-icon>refresh</mat-icon>
            Reload
          </button>
          <button
            mat-raised-button
            color="primary"
            type="button"
            (click)="save()"
            [disabled]="!hasChanges || locked"
          >
            <mat-icon>save</mat-icon>
            Save
          </button>
        </div>
      </div>
    </mat-card-content>
  </mat-card>

  <mat-card>
    <mat-card-header>
      <mat-card-title>Instrument Candidates</mat-card-title>
    </mat-card-header>
    <mat-card-content>
      <div *ngIf="loading; else loadedContent" class="state-block">
        Loading quote monitor instruments
      </div>

      <ng-template #loadedContent>
        <div *ngIf="filteredOptions.length === 0; else tableContent" class="state-block">
          No instruments found
        </div>

        <ng-template #tableContent>
          <table mat-table [dataSource]="filteredOptions" class="mat-elevation-z2 selection-table">

            <ng-container matColumnDef="selected">
              <th mat-header-cell *matHeaderCellDef class="selection-header-cell">
                <mat-checkbox
                  aria-label="Select visible instruments"
                  [checked]="allVisibleSelected"
                  [indeterminate]="someVisibleSelected && !allVisibleSelected"
                  [disabled]="locked"
                  (change)="onToggleVisible($event)"
                ></mat-checkbox>
              </th>
              <td mat-cell *matCellDef="let option" class="selection-cell">
                <mat-checkbox
                  [attr.aria-label]="'Select ' + option.instrumentCode"
                  [checked]="isSelected(option.instrumentCode)"
                  [disabled]="locked"
                  (change)="onToggle(option.instrumentCode, $event.checked)"
                ></mat-checkbox>
              </td>
            </ng-container>

            <ng-container matColumnDef="instrumentCode">
              <th mat-header-cell *matHeaderCellDef>Instrument Code</th>
              <td mat-cell *matCellDef="let option" class="instrument-code-cell">
                {{ option.instrumentCode }}
              </td>
            </ng-container>

            <ng-container matColumnDef="state">
              <th mat-header-cell *matHeaderCellDef>State</th>
              <td mat-cell *matCellDef="let option">
                <span
                  class="state-badge"
                  [class.state-badge--selected]="isSelected(option.instrumentCode)"
                  [class.state-badge--changed]="isSelected(option.instrumentCode) !== isSaved(option.instrumentCode)"
                >
                  {{ rowStateLabel(option.instrumentCode) }}
                </span>
              </td>
            </ng-container>

            <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
            <tr
              mat-row
              *matRowDef="let row; columns: displayedColumns;"
              [class.selection-row--selected]="isSelected(row.instrumentCode)"
              [class.selection-row--changed]="isSelected(row.instrumentCode) !== isSaved(row.instrumentCode)"
            ></tr>
          </table>
        </ng-template>
      </ng-template>
    </mat-card-content>
  </mat-card>

</div>
