<div class="center-box">
  <!-- карточка со списком паспортов провайдеров -->
  <mat-card>
    <mat-card-header>
      <mat-card-title>Providers</mat-card-title>
    </mat-card-header>
    <mat-card-content>
      <table mat-table [dataSource]="dataSource" class="mat-elevation-z2">

        <ng-container matColumnDef="providerCode">
          <th mat-header-cell *matHeaderCellDef>Code</th>
          <td mat-cell *matCellDef="let passport">{{ passport.providerCode }}</td>
        </ng-container>

        <ng-container matColumnDef="displayName">
          <th mat-header-cell *matHeaderCellDef>Provider</th>
          <td mat-cell *matCellDef="let passport">{{ passport.displayName }}</td>
        </ng-container>

        <ng-container matColumnDef="deliveryMode">
          <th mat-header-cell *matHeaderCellDef>Delivery Mode</th>
          <td mat-cell *matCellDef="let passport">{{ passport.deliveryMode }}</td>
        </ng-container>

        <ng-container matColumnDef="accessMethod">
          <th mat-header-cell *matHeaderCellDef>Access Method</th>
          <td mat-cell *matCellDef="let passport">{{ passport.accessMethod }}</td>
        </ng-container>

        <ng-container matColumnDef="bulkSubscription">
          <th mat-header-cell *matHeaderCellDef>Bulk Subscription</th>
          <td mat-cell *matCellDef="let passport">
            {{ passport.bulkSubscription ? 'Yes' : 'No' }}
          </td>
        </ng-container>

        <ng-container matColumnDef="lifecycleStatus">
          <th mat-header-cell *matHeaderCellDef>Status</th>
          <td mat-cell *matCellDef="let passport">
            <span
              class="status-badge"
              [class.status-badge--retired]="passport.lifecycleStatus === 'RETIRED'"
            >
              {{ passport.lifecycleStatus }}
            </span>
          </td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="displayed"></tr>
        <tr
          mat-row
          *matRowDef="let row; columns: displayed;"
          [class.retired-row]="row.lifecycleStatus === 'RETIRED'"
        ></tr>
        <tr class="mat-row" *matNoDataRow>
          <td class="mat-cell" [attr.colspan]="displayed.length">No provider passports found.</td>
        </tr>
      </table>
    </mat-card-content>
  </mat-card>
</div>
