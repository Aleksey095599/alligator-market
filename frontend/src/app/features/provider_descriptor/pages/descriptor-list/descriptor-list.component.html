<div class="center-box">
  <!-- карточка со списком дескрипторов провайдеров -->
  <mat-card>
    <mat-card-header>
      <mat-card-title>Provider Descriptors</mat-card-title>
    </mat-card-header>
    <mat-card-content>
      <table mat-table [dataSource]="dataSource" class="mat-elevation-z2">

        <ng-container matColumnDef="displayName">
          <th mat-header-cell *matHeaderCellDef>Provider</th>
          <td mat-cell *matCellDef="let descriptor">{{ descriptor.displayName }}</td>
        </ng-container>

        <ng-container matColumnDef="deliveryMode">
          <th mat-header-cell *matHeaderCellDef>Delivery Mode</th>
          <td mat-cell *matCellDef="let descriptor">{{ descriptor.deliveryMode }}</td>
        </ng-container>

        <ng-container matColumnDef="accessMethod">
          <th mat-header-cell *matHeaderCellDef>Access Method</th>
          <td mat-cell *matCellDef="let descriptor">{{ descriptor.accessMethod }}</td>
        </ng-container>

        <ng-container matColumnDef="bulkSubscription">
          <th mat-header-cell *matHeaderCellDef>Bulk Subscription</th>
          <td mat-cell *matCellDef="let descriptor">
            {{ descriptor.bulkSubscription ? 'Yes' : 'No' }}
          </td>
        </ng-container>

        <ng-container matColumnDef="minUpdateIntervalSeconds">
          <th mat-header-cell *matHeaderCellDef>Min Update Interval (s)</th>
          <td mat-cell *matCellDef="let descriptor">
            {{ descriptor.minUpdateIntervalSeconds }}
          </td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="displayed"></tr>
        <tr mat-row *matRowDef="let row; columns: displayed;"></tr>
      </table>
    </mat-card-content>
  </mat-card>
</div>
