<mat-toolbar color="primary">
  <button mat-button routerLink="/">Home</button>
  <button mat-button routerLink="/currencies">Currencies</button>
  <button mat-button routerLink="/fx-spot">FX Spot</button>
  <button mat-button routerLink="/instruments">Instrument Catalog</button>
  <button mat-button routerLink="/sources">Sources</button>
  <button mat-button routerLink="/capturers">Capturers</button>
  <button mat-button routerLink="/source-plans">Source Plans</button>
  <button
    mat-button
    type="button"
    class="nav-menu-trigger"
    [class.nav-menu-trigger--active]="quoteMonitorActive"
    [matMenuTriggerFor]="quoteMonitorMenu"
  >
    Quote Monitor
    <mat-icon>expand_more</mat-icon>
  </button>

  <mat-menu #quoteMonitorMenu="matMenu">
    <button mat-menu-item routerLink="/quote-monitor/instruments">
      <mat-icon>fact_check</mat-icon>
      <span>Instruments</span>
    </button>
    <button mat-menu-item routerLink="/quote-monitor/live-quotes">
      <mat-icon>monitoring</mat-icon>
      <span>Live Quotes</span>
    </button>
  </mat-menu>
</mat-toolbar>

<router-outlet></router-outlet>
