# ===============================
# APPLICATION
# ===============================
spring.application.name=backend
# ===============================
# DATABASE CONNECTION
# ===============================
spring.datasource.url=jdbc:postgresql://localhost:5432/postgres
spring.datasource.username=postgres
spring.datasource.password=1234
# ===============================
# FLYWAY MIGRATION  
# ===============================
spring.flyway.enabled=false
spring.flyway.validate-on-migrate=true
# ===============================
# JPA / HIBERNATE
# ===============================
spring.jpa.open-in-view=false
spring.jpa.hibernate.ddl-auto=update
# ===============================
# LOGGING CONFIGURATION
# ===============================
logging.level.root=WARN
logging.level.com.alligator.market=DEBUG
logging.level.reactor.netty.http.client=DEBUG
# ===============================
# KAFKA CONFIGURATION
# ===============================
spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.properties.schema.registry.url=http://localhost:8082
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=io.confluent.kafka.serializers.KafkaAvroSerializer
# ===============================
# PROVIDER CONNECTION CONFIG
# ===============================
quotes.provider.twelve.pull.name=twelve_free_mid_pull
provider.connection-config.twelve-free.base-url=https://api.twelvedata.com
provider.connection-config.twelve-free.api-key=${TWELVE_API_KEY}
# ===============================
# TIME ZONE
# ===============================
app.time-zone=Europe/Moscow
spring.jackson.time-zone=${app.time-zone}
spring.jpa.properties.hibernate.jdbc.time_zone=${app.time-zone}
# ===============================
# REACTOR NETTY
# ===============================
spring.reactor.netty.http.client.wiretap=true