# ===============================
# APPLICATION
# ===============================
spring.application.name=backend

# ===============================
# TIME CONFIGURATION
# ===============================
app.time.business-zone-id=Europe/Moscow
spring.jackson.time-zone=UTC

# ===============================
# DATABASE CONNECTION
# ===============================
spring.datasource.url=jdbc:postgresql://localhost:5432/postgres
spring.datasource.hikari.connection-init-sql=SET TIME ZONE 'UTC'
spring.datasource.username=postgres
spring.datasource.password=1234

# ===============================
# SQL INIT
# ===============================
spring.sql.init.mode=never

# ===============================
# LOGGING CONFIGURATION
# ===============================
logging.level.root=INFO
logging.level.com.alligator.market=INFO
logging.level.reactor.netty.http.client=INFO
logging.file.path=logs

# ==================================
# MARKET DATA PROVIDER CONFIGURATION
# ==================================
# MOEX ISS connection configuration:
market-data-source.connection-properties.moex.iss.fx-spot.base-url=https://iss.moex.com/iss
