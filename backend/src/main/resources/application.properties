# ===============================
# APPLICATION
# ===============================
spring.application.name=backend

# ===============================
# TIME CONFIGURATION
# ===============================
app.time.business-zone-id=Europe/Moscow
spring.jackson.time-zone=UTC

# ===============================
# DATABASE CONNECTION
# ===============================
spring.datasource.url=jdbc:postgresql://localhost:5432/postgres
spring.datasource.hikari.connection-init-sql=SET TIME ZONE 'UTC'
spring.datasource.username=postgres
spring.datasource.password=1234

# ===============================
# SQL INIT
# ===============================
spring.sql.init.mode=never

# ===============================
# LOGGING CONFIGURATION
# ===============================
logging.level.root=INFO
logging.level.com.alligator.market=INFO
logging.level.reactor.netty.http.client=INFO
logging.file.path=logs

# ==================================
# MARKET DATA SOURCE CONFIGURATION
# ==================================
# Shared handler WebClient configuration:
market-source.handler-web-client.connect-timeout=3s
market-source.handler-web-client.response-timeout=6s

# MOEX ISS connection configuration:
market-source.connection-properties.moex.iss.fx-spot.base-url=https://iss.moex.com/iss

# MOEX ISS FX Spot handler configuration:
market-source.handler-properties.moex.iss.fx-spot.poll-interval=5s
